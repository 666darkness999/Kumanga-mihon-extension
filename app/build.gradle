plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'eu.kanade.tachiyomi.extension.es.kumanga'
    compileSdk 34
    defaultConfig {
        applicationId 'eu.kanade.tachiyomi.extension.es.kumanga'
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.0.1"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "org.jsoup:jsoup:1.17.2"
    implementation "eu.kanade.tachiyomi:extension-api:1.5"
}
